<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clusterphuq</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(3rem, 12vw, 10rem);
      color: #fff;
      text-align: center;
      letter-spacing: 0.04em;
      user-select: none;

      animation: appear 1s ease forwards;
      opacity: 0;
    }

    @keyframes appear {
      from {
        opacity: 0;
        transform: scale(0.92);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <h1 class="title">Clusterphuq</h1>
</body>
</html>
